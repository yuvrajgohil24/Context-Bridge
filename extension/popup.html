<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContextBridge</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --surface2: #222228;
      --border: #2a2a33;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.25);
      --text: #e4e4e7;
      --muted: #71717a;
      --success: #10b981;
      --error: #f87171;
    }

    body {
      width: 380px;
      min-height: 480px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo img { width: 100%; height: 100%; object-fit: contain; }

    header h1 { font-size: 15px; font-weight: 600; color: white; letter-spacing: -0.3px; }
    header span { font-size: 11px; color: var(--muted); margin-left: auto; }

    #settings-toggle {
      background: none;
      border: none;
      color: var(--muted);
      padding: 4px;
      cursor: pointer;
    }
    #settings-toggle:hover { color: var(--text); }

    #settings-row {
      display: none;
      margin: 10px 16px 0;
      gap: 6px;
      align-items: center;
    }
    #api-base-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      outline: none;
    }
    #api-base-input:focus { border-color: var(--accent); }
    #api-base-save {
      padding: 8px 12px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      font-size: 12px;
    }
    #api-base-save:hover { border-color: var(--accent); }

    /* ── Status Bar ── */
    #status-bar {
      margin: 12px 16px 0;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
    }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.active { background: var(--success); }
    #status-dot.error  { background: var(--error); }

    /* ── Preview ── */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin: 14px 16px 6px;
    }

    #preview-box, #output-box {
      margin: 0 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
      min-height: 56px;
      max-height: 100px;
      overflow-y: auto;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      transition: border-color 0.2s;
    }
    #output-box {
      max-height: 130px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      line-height: 1.6;
    }

    .char-count {
      text-align: right;
      font-size: 10px;
      color: var(--muted);
      margin: 4px 16px 0;
    }

    /* ── Buttons ── */
    .btn-row {
      margin: 14px 16px 0;
      display: flex;
      gap: 8px;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    #compress-btn {
      flex: 1;
      padding: 10px 16px;
      background: var(--accent);
      color: white;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    #compress-btn:hover:not(:disabled) {
      background: #4f52e8;
      box-shadow: 0 0 24px var(--accent-glow);
      transform: translateY(-1px);
    }
    #compress-btn:disabled {
      background: var(--surface2);
      color: var(--muted);
      box-shadow: none;
      cursor: not-allowed;
    }

    #copy-btn {
      padding: 10px 14px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    #copy-btn:hover:not(:disabled) { background: var(--surface); border-color: var(--accent); }
    #copy-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #copy-btn.copied { background: rgba(16,185,129,0.15); border-color: var(--success); color: var(--success); }

    /* ── Spinner ── */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Token badge ── */
    #token-badge {
      display: none;
      margin: 4px 16px 0;
      font-size: 10px;
      color: #818cf8;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 999px;
      padding: 2px 8px;
      width: fit-content;
    }

    /* ── Error ── */
    #error-msg {
      display: none;
      margin: 8px 16px 0;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--error);
    }

    .metadata-row {
      margin: 6px 16px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .meta-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    footer {
      margin-top: auto;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      text-align: center;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="contextbridge_icon.png" alt="ContextBridge Logo">
    </div>
    <h1>ContextBridge</h1>
    <span id="page-host">—</span>
    <button id="settings-toggle" title="API endpoint settings">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
    </button>
  </header>

  <div id="settings-row">
    <input id="api-base-input" type="url" placeholder="http://localhost:3000" spellcheck="false" />
    <button id="api-base-save">Save</button>
  </div>

  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Scanning page...</span>
  </div>

  <p class="section-label">Scraped Preview</p>
  <div id="preview-box">—</div>
  <div class="metadata-row">
    <div id="scraped-turns" class="meta-badge" style="display:none">0 turns</div>
    <div id="scraped-tokens" class="meta-badge" style="display:none">0 tokens</div>
    <div class="char-count"><span id="char-count">0</span> chars</div>
  </div>

  <div id="error-msg"></div>

  <div class="btn-row">
    <button id="compress-btn" disabled>
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
      </svg>
      Compress
    </button>
    <button id="copy-btn" disabled title="Copy to clipboard">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3"/>
      </svg>
    </button>
  </div>

  <p class="section-label" id="output-label" style="display:none">Compressed Output</p>
  <div id="output-box" style="display:none"></div>
  <div id="token-badge"></div>

  <footer>Powered by ContextBridge &amp; Gemini</footer>

  <script src="popup.js"></script>
</body>
</html>
